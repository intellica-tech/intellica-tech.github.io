slug: "icc"
lang: "tr"
name: "ICC — Intellica Consistency Controller"

pageTitle: "ICC — Intellica Consistency Controller | Intellica"
pageDescription: >
  ICC: Otomatik veri mutabakatı ve tutarlılık yönetimi; kaynak sistemler ile
  raporlama katmanları arasında güven sağlayan gerçek zamanlı sapma uyarıları.

hero:
  category: "Veri Platformu & Yönetişim"
  titlePrefix: "ICC — Tutarlılık"
  titleHighlight: "Denetleyicisi"
  description: >
    Kurumsal verilerinizde tam tutarlılık sağlayın. Otomatik mutabakat, kalite
    kapıları ve gerçek zamanlı sapma uyarılarıyla tutarsızlıkları ortadan
    kaldırın. Kaynaktan rapora verilerinize güvenin.

overview:
  problem: >
    Veriler genellikle kaynak sistemler ile veri ambarı arasında farklılık
    gösterir; bu durum çelişkili raporlara, yönetim güveninin kaybına ve
    düzenleyici risklere yol açar.
  approach: >
    ICC, birden fazla veri noktası arasındaki mutabakat sürecini otomatikleştirerek
    tutarsızlıkları kayıt düzeyinde, iş kararlarınızı etkilemeden önce tespit eder.
  businessValue: >
    Manuel mutabakat çabasında %90 azalma. Veri entegrasyon hatalarının anında
    tespiti. Daha yüksek denetim hazırlığı.
  whenPreferred:
    - "Finansal raporlar aynı dönem için farklı rakamlar gösterdiğinde"
    - "ETL/ELT iş hatlarınızda otomatik \"Kalite Kapıları\" uygulamak istediğinizde"
    - "Resmi mutabakat kayıtları gerektiren düzenleyici uyumluluk ihtiyacında"
    - "Karmaşık veri göçlerinde birebir veri eşliğini sağlamak için"
    - "BT ve Muhasebe ekiplerinin operasyonel yükünü azaltmak istediğinizde"
  preferredNote: "Not: ICC, milyonlarca kayıt üzerinde yüzlerce mutabakat kuralına ölçeklenebilir."

capabilities:
  label: "Yetenekler"
  heading: "Temel"
  headingHighlight: "Yetenekler"
  items:
    - title: "Otomatik Mutabakat"
      description: "Özel ve kırılgan denetim betikleri yazmadan sistemler arası veri eşleştirmesi."
    - title: "Kalite Kapıları"
      description: "Hatalı verilerin üretim raporlarına ulaşmasını engelleyen kriterler tanımlayın."
    - title: "Sapma Uyarıları"
      description: "Sistemler arası veri sapması eşik değerlerini aştığında anında bildirim alın."
    - title: "Denetim Kaydı"
      description: "Mutabakat sonuçlarının tam geçmişi; düzenleyici uyumluluk için mükemmel."
    - title: "Kural Motoru"
      description: "Derin SQL uzmanlığı gerektirmeden karmaşık tutarlılık kurallarını görsel olarak tanımlayın."
    - title: "Sağlık Panosu"
      description: "Kuruluş genelinde veri sağlığı ve tutarlılık durumunun üst düzey görünümü."

featureSection:
  heading: "Yapılandırılabilir"
  headingHighlight: "Kalite Kuralları"
  description: >
    ICC, veri sahiplerini sezgisel ve görsel bir arayüz aracılığıyla karmaşık
    doğrulama kuralları oluşturma konusunda güçlendirir. Manuel veri denetimini
    üretim seviyesinde otomatik bir motora dönüştürün.
  calloutTitle: "Görsel Kural Mantığı"
  calloutDescription: "Sürükle-bırak ile karmaşıklığı standart veri kalitesi sinyallerine dönüştürün."
  image: "/assets/images/icc_rule.png"
  imageAlt: "ICC Kural Tasarım Arayüzü"
  imageCaption: "ICC Arayüzü: Karmaşık veri doğrulama akışlarının görsel yapılandırması."

