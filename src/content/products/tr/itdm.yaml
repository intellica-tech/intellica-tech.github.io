slug: "itdm"
lang: "tr"
name: "ITDM — Intellica Telecom Data Model"

pageTitle: "ITDM — Intellica Telecom Data Model | Intellica"
pageDescription: >
  ITDM: Endüstri standardında telekom veri ambarı modeli; TM Forum SID uyumlu,
  ağ, faturalama ve CRM'i kapsayan hızlı analitik dağıtımı.

hero:
  category: "Veri Modelleri"
  titlePrefix: "ITDM — Telekom"
  titleHighlight: "Veri Modeli"
  description: >
    Telekom analitik altyapınızı küresel ölçekte büyütün. Dijital dönüşümünüzü
    ve ağ zekânızı önceden modellenmiş bir endüstri veri ambarıyla
    hızlandırın.

overview:
  problem: >
    Telekom verileri (CDR, Faturalama, Ağ, CRM) devasa ve son derece
    karmaşıktır. Sürdürülebilir bir modeli sıfırdan tasarlamak yavaştır ve
    mimari borca yatkındır.
  approach: >
    Intellica Telecom Data Model (ITDM), hızlı uygulama için önceden
    tanımlanmış eşleme şablonlarıyla endüstri standardında, konu odaklı bir
    telekom veri modeli (TM Forum SID uyumlu) sunar.
  businessValue: >
    Modelleme çabasında önemli azalma, ağ içgörüleri için daha hızlı pazara
    çıkış süresi ve küresel endüstri standardizasyonu.
  whenPreferred:
    - "Dayanıklı, güvenilir ve sürdürülebilir bir analitik platforma ihtiyaç duyulduğunda"
    - "TM Forum SID gibi endüstri standartlarıyla uyum sağlanırken"
    - "İş birimleri ve bölgesel birimler genelinde KPI'ların standartlaştırılması için"
    - "CDR, ağ olayı ve faturalama verilerinin iş kullanımına hazır içgörüler sunmak için uyumlaştırılması ve modellenmesinde"
    - "5G analitik projelerinin hızlandırılması için"
  preferredNote: ""

capabilities:
  label: "Yetenekler"
  heading: "Telekoma Özel"
  headingHighlight: "Yetenekler"
  items:
    - title: "SID Uyumu"
      description: "TM Forum Paylaşımlı Bilgi/Veri modeli standartlarıyla sıkı uyum."
    - title: "Alan Kapsamı"
      description: "Ses, Data, SMS, Faturalama, KDS ve CRM veri noktaları için eksiksiz kapsam."
    - title: "Yüksek Performans"
      description: "Devasa telekom ölçeğinde CDR hacimlerinin işlenmesi ve indekslenmesi için optimize edilmiştir."
    - title: "Evrensel Boyutlar"
      description: "Standartlaştırılmış coğrafya, zaman, müşteri ve ürün boyutları."
    - title: "Telekom Metrikleri"
      description: "Kayıp oranı, ARPU ve ağ QoS/QoE için kullanıma hazır iş formülleri."
    - title: "Geleceğe Hazır"
      description: "5G, IoT ve uç bilişim tabanlı veri varlıkları gibi yeni teknolojileri destekler."

