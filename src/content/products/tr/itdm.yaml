    mühendisliği ile ticari zekâ arasında uyum sağlar.
  calloutTitle: "TM Forum SID Uyumlu"
  calloutDescription: "Ağ, faturalama ve CRM ekosistemlerini kapsayan konu odaklı yapılar."
