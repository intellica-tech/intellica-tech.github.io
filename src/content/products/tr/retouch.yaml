slug: "retouch"
lang: "tr"
name: "ReTouch — Entry Management"

pageTitle: "ReTouch — Referans Veri & Giriş Yönetimi | Intellica"
pageDescription: >
  ReTouch: Yönetişimli veri girişi ve referans veri yönetimi; manuel süreçleri
  doğrulanmış iş akışları ve tam denetim izleriyle değiştirir.

hero:
  category: "Veri Platformu & Yönetişim"
  titlePrefix: "ReTouch — Giriş"
  titleHighlight: "Yönetimi"
  description: >
    Manuel veri girişlerinizi ve referans verilerinizi kontrol altına alın.
    Excel tabanlı veri toplamayı ortadan kaldırın ve süreçlerinizi onay iş
    akışları, doğrulama kuralları ve tam denetlenebilirlikle güvence altına alın.

overview:
  problem: >
    Ana ve referans veriler için manuel veri girişine veya paylaşılan Excel
    tablolarına güvenmek hatalara, doğrulama eksikliğine ve sıfır denetim
    izine yol açar.
  approach: >
    ReTouch, veri girişi için web tabanlı, yönetişimli bir arayüz sunar.
    Verilerin iş kurallarınıza göre doğrulanmasını ve çekirdek sistemlere
    girmeden önce belirlenen paydaşlar tarafından onaylanmasını sağlar.
  businessValue: >
    %100 denetlenebilir veri girişi. Veri düzeltme maliyetlerinde önemli
    azalma. Önemli ölçüde iyileştirilmiş referans veri kalitesi.
  whenPreferred:
    - "Referans veriler (etiketler, kategoriler, arama tabloları) şu anda Excel'de yönetildiğinde"
    - "Kritik veri değişiklikleri için \"Yapıcı-Denetleyici\" onay iş akışları uygulamak istediğinizde"
    - "Manuel veri girişinin mevcut sistem verilerine göre doğrulanması gerektiğinde"
    - "Tüm manuel veri güncellemelerinin tam sürüm geçmişini tutmak için"
    - "Veri yönetişim politikaları resmi veri giriş kontrolleri gerektirdiğinde"
  preferredNote: "Not: ReTouch, güvenli erişim için mevcut kimlik yönetim sisteminizle entegre olur."

capabilities:
  label: "Yetenekler"
  heading: "Temel"
  headingHighlight: "Yetenekler"
  items:
    - title: "Özel İş Akışları"
      description: "Çok katmanlı Yapıcı-Denetleyici-Onaylayıcı modelleri dahil esnek onay adımları."
    - title: "Veri Doğrulama"
      description: "Regex, aralık kontrolleri ve çapraz referans arama gibi katı kuralları uygulayın."
    - title: "Tam Denetim İzi"
      description: "Her bir değişikliği takip edin: Kim neyi, ne zaman değiştirdi ve önceki/sonraki durumu."
    - title: "Sürüm Kontrolü"
      description: "Referans veri tablolarınızın önceki durumlarına kolayca göz atın ve geri dönün."
    - title: "Form Oluşturucu"
      description: "Ön yüz kodu yazmadan veri giriş ekranlarını dinamik olarak oluşturun ve dağıtın."
    - title: "Sistem Senkronizasyonu"
      description: "Onaylanan verileri otomatik olarak hedef DWH, Lakehouse veya ERP sistemlerinize aktarın."

featureSection:
  heading: "Doğrulanmış"
  headingHighlight: "Veri Girişi"
  description: >
    ReTouch, doğrudan veri etkileşimi için güvenli, web tabanlı bir katman
    sağlar. Kaynak sistemler ile analitik katman arasındaki boşluğu
    doğrulanmış bir yönetim konsoluyla kapatın.
  calloutTitle: "Yönetişim Kontrolü"
  calloutDescription: "Veri sahiplerini tam denetlenebilirlikle parametreleri ve referans verileri doğrudan yönetmeleri için güçlendirin."
  image: "/assets/images/Retouch_Ekran görüntüsü.png"
  imageAlt: "ReTouch Arayüzü"
  imageCaption: "ReTouch Arayüzü: Doğrulanmış veri girişi ve yönetim katmanı."

