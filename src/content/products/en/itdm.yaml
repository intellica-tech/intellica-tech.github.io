name: "ITDM — Intellica Telecom Data Model"

pageTitle: "ITDM — Intellica Telecom Data Model | Intellica"
pageDescription: >
  ITDM: Industry-standard telecom data warehouse model; TM Forum SID aligned,
  covering network, billing and CRM for rapid analytics deployment.

hero:
  category: "Data Models"
  titlePrefix: "ITDM — Telecom"
  titleHighlight: "Data Model"
  description: >
    Scale your telecom analytics infrastructure globally. Accelerate your digital
    transformation and network intelligence with a pre-modeled industry data
    warehouse.

overview:
  problem: >
    Telecom data (CDR, Billing, Network, CRM) is massive and highly complex.
    Designing a sustainable model from scratch is slow and prone to architectural
    debt.
  approach: >
    Intellica Telecom Data Model (ITDM) provides an industry-standard,
    subject-oriented telecom data model (aligned with TM Forum SID) with
    pre-defined mapping templates for rapid implementation.
  businessValue: >
    Significant reduction in modeling effort, faster time-to-market for network
    insights, and global industry standardization.
  whenPreferred:
    - "When a durable, reliable and sustainable analytical platform is needed"
    - "Aligning with industry standards such as TM Forum SID"
    - "Standardizing KPIs across business units and regional entities"
    - "Harmonizing and modeling CDR, network event, and billing data to deliver business-ready insights"
    - "Accelerating 5G analytics projects"
  preferredNote: ""

