slug: "retouch"
lang: "en"
name: "ReTouch — Entry Management"

pageTitle: "ReTouch — Reference Data & Entry Management | Intellica"
pageDescription: >
  ReTouch: Governed data entry and reference data management; replacing manual
  processes with validated workflows and full audit trails.

hero:
  category: "Data Platform & Governance"
  titlePrefix: "ReTouch — Entry"
  titleHighlight: "Management"
  description: >
    Master your manual data entries and reference data. Eliminate Excel-based
    collection and secure your processes with approval workflows, validation
    rules, and full auditability.

overview:
  problem: >
    Relying on manual data entry or shared Excel sheets for master and reference
    data leads to errors, lack of validation, and zero audit trails.
  approach: >
    ReTouch provides a web-based, governed interface for data entry. It ensures
    data is validated against your business rules and approved by designated
    stakeholders before entering core systems.
  businessValue: >
    100% auditable data entry. Significant reduction in data correction costs.
    Significantly improved reference data quality.
  whenPreferred:
    - "When reference data (tags, categories, lookups) is currently managed in Excel"
    - "To implement \"Maker-Checker\" approval workflows for critical data changes"
    - "When manual data entry needs to be validated against existing system data"
    - "To maintain a full version history of all manual data updates"
    - "When data governance policies require formal data entry controls"
  preferredNote: "Note: ReTouch integrates with your existing identity management for secure access."

capabilities:
  label: "Capabilities"
  heading: "Core"
  headingHighlight: "Capabilities"
  items:
    - title: "Custom Workflows"
      description: "Flexible approval steps including multi-tier Maker-Checker-Approver patterns."
    - title: "Data Validation"
      description: "Enforce strict rules like regex, range checks, and cross-reference lookups."
    - title: "Full Audit Trail"
      description: "Track every single change: Who changed what, when, and the before/after state."
    - title: "Version Control"
      description: "Easily browse and revert to previous states of your reference data tables."
    - title: "Form Builder"
      description: "Create and deploy data entry screens dynamically without writing front-end code."
    - title: "System Sync"
      description: "Automatically push approved data into your target DWH, Lakehouse, or ERP systems."

featureSection:
  heading: "Validated"
  headingHighlight: "Data Entry"
  description: >
