            - "Integrates seamlessly with databases and reporting tools."
            - "Delivers responses as tables, charts, or summarized analysis."
          impactLabel: "BUSINESS IMPACT"
          impactItems:
            - "Faster self-service analytics adoption."
            - "Reduced ad-hoc workload on IT and BI teams."
            - "Shorter data-to-decision cycles."
        - title: "Ad-hoc Reporting Automation"
          badges: ["Self-Service", "Reporting"]
          scenario: "Teams spend excessive hours manually compiling reports for one-off vertical analysis requests."
          interventionLabel: "Talk To Intervention"
          interventionItems:
            - "Standardize semantic layers for consistent field definitions."
            - "Allow business users to generate on-the-fly reports via chat."
            - "Export results instantly to common analysis formats."
          impactLabel: "BUSINESS IMPACT"
          impactItems:
            - "Minimizes manual reporting errors."
            - "Frees up expert resources for strategic projects."
            - "Transparent and auditable query history."
    - id: "customer"
      label: "Customer Support"
      cards:
        - title: "360° Customer View & Rapid Support"
          badges: ["Support", "Customer 360"]
          scenario: "Support agents searching for data across CRM, billing, and interaction systems leads to time loss and incomplete context."
