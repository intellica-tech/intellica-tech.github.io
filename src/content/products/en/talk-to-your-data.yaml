      title: "Connect & Authorize"
      description: "Define data sources, schema metadata, and role-based access controls."
    - number: "02"
      title: "Ask & Verify"
      description: "Question submitted, query generated and validated before execution."
    - number: "03"
      title: "Insight & Action"
      description: "Results delivered as summaries, charts, or triggered workflows (MCP)."

integration:
  heading: "Ecosystem"
  headingHighlight: "Integration"
  description: "Built to integrate with existing enterprise architecture and governance standards:"
  items:
    - "Enterprise DB/DWH/Data Lake connectivity (SQL, NoSQL)"
    - "Schema-aware mapping for accurate domain-specific querying"
    - "MCP-compatible application orchestration (Reporting, CRM)"
    - "Full SSO/LDAP integration and granular RBAC auditing"
    - "Centralized logging for all AI-generated query operations"

