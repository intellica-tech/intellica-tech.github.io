          interventionItems:
            - "Analyzes CRM and transaction history in an integrated way."
            - "Provides contextual customer summaries to representatives."
            - "Generates Next Best Action (NBA) suggestions based on data."
          impactLabel: "BUSINESS IMPACT"
          impactItems:
            - "Higher First Contact Resolution (FCR) rates."
            - "Shortened Average Handling Time (AHT) per case."
            - "Increased customer satisfaction and cross-sell potential."
    - id: "management"
      label: "Executive Insights"
      cards:
        - title: "Instant KPI Querying for Management"
          badges: ["Executive", "KPI Tracking"]
          scenario: "Senior management often depends on dashboard updates or technical teams to access real-time KPI performance."
          interventionLabel: "Talk To Intervention"
          interventionItems:
            - "Enables natural language querying of high-level KPIs."
            - "Supports contextual filtering and seamless drill-down."
            - "Produces instant charts and executive summary reports."
          impactLabel: "BUSINESS IMPACT"
          impactItems:
            - "Immediate access to management reports."
            - "Simplified KPI interpretation and trend analysis."
            - "Strengthened strategic decision-making capabilities."

journey:
