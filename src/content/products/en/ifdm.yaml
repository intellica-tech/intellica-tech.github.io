pageDescription: >
  IFDM: Standard data model approach for finance analytics; fast
  mapping/discovery, KPI framework and wave-based reporting rollout.

hero:
  category: "Data Models"
  titlePrefix: "IFDM — Finance"
  titleHighlight: "Data Model"
  description: >
    Rapidly deploy your enterprise finance data model. Establish a common
    financial language and accelerate your data warehouse transformation.

overview:
  problem: >
    Banking data is fragmented across core domains such as Loans, Deposits,
    Credit Cards, and Customers, managed in separate systems. This leads to
    inconsistent KPIs, reconciliation issues, and unreliable reporting.
  approach: >
    IFDM integrates Loans, Deposits, Credit Cards, Customers, and Transactions
    into a single, standardized data model — ensuring consistent definitions,
    aligned reporting, and a true single source of truth.
  businessValue: >
    Provides a single source of truth for executives and decision-makers,
    enabling faster, more reliable, and audit-ready financial reporting with
    reduced reconciliation effort.
  whenPreferred:
    - "When the enterprise finance model needs to be standardized during DWH/BI or analytics projects"
    - "When there are inconsistencies between GL, AP/AR, budget, and profitability reports"
    - "During Semantic model/Power BI transformation"
    - "When consolidation and management reporting need to be made sustainable"
    - "When a common dictionary and governance are targeted for finance KPIs"
  preferredNote: ""

