journey:
  heading: "Central Authority"
  headingHighlight: "Model"
  description: "Unlike traditional distributed schedulers, Orqenta centralizes decision logic to eliminate split-brain issues and out-of-sync states."
  steps:
    - number: "01"
      title: "Stateless Agents"
      description: "Execution agents pull tasks via HTTP polling, meaning zero inbound ports and easy network scaling."
    - number: "02"
      title: "State Machine"
      description: "The state is managed entirely by a central database, ensuring every transition is atomic and durable."
    - number: "03"
      title: "Tag-Based Routing"
      description: "Intelligent job routing based on labels, capabilities, or geographical constraints of execution agents."

integration:
  heading: "Security &"
  headingHighlight: "Governance"
  description: "Orqenta is built for mission-critical enterprise environments requiring high reliability:"
  items:
    - "RBAC: Granular permissions for Admins, Developers, Operators, and Viewers."
    - "Auth: mTLS or HMAC-SHA256 based agent authentication for secure communication."
    - "Protection: Built-in SSRF protection to prevent metadata leakage in cloud environments."
    - "Masking: Automatic redaction of secrets and credentials in logs and user interfaces."

